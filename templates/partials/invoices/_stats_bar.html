<!-- ── Stat Cards ── -->
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
  <div class="bg-gray-900 border border-indigo-800 border-opacity-50 rounded-xl p-4 text-center flex flex-col items-center justify-center gap-1.5">
    <p class="text-sm font-bold" id="stat-tracker">—</p>
    <p class="text-xs text-gray-500">Master Tracker</p>
    <button onclick="document.getElementById('tracker-input').click()" class="text-xs text-indigo-400 hover:text-indigo-300 underline underline-offset-2 transition">
      ⬆ Upload Tracker
    </button>
    <input type="file" id="tracker-input" accept=".xlsx" class="hidden" onchange="uploadTracker(this.files[0])" />
    <div id="tracker-upload-status" class="text-xs text-indigo-300 hidden"></div>
  </div>

  <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 text-center">
    <p class="text-2xl font-black text-white" id="stat-clients">—</p>
    <p class="text-xs text-gray-500 mt-1">Client Folders</p>
  </div>

  <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 text-center flex flex-col items-center justify-center gap-1.5">
    <p class="text-sm font-bold" id="stat-report">—</p>
    <p class="text-xs text-gray-500">Sorting Report</p>
    <button id="btn-download-report" onclick="downloadReport()" class="text-xs text-sky-400 hover:text-sky-300 underline underline-offset-2 transition hidden">
      ⬇ Download CSV
    </button>
    <p id="report-na" class="text-xs text-gray-600">Run sort first</p>
  </div>

  <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 text-center">
    <p class="text-2xl font-black text-white" id="stat-pdfs">—</p>
    <p class="text-xs text-gray-500 mt-1">Processed Invoices</p>
  </div>
</div>
