<div class="space-y-3">

  <!-- Drop Zone -->
  <div id="drop-zone" class="rounded-2xl p-8 text-center cursor-pointer bg-gray-900"
    ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"
    onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" multiple accept=".pdf" class="hidden" onchange="uploadFiles(this.files)" />
    <div class="text-3xl mb-2">📂</div>
    <p class="text-sm font-semibold text-gray-300">Drag & drop PDF invoices here</p>
    <p class="text-xs text-gray-600 mt-1">or click to browse — files saved to <code class="text-gray-400">invoices/</code></p>
    <div id="upload-status" class="mt-3 text-xs text-sky-400 hidden"></div>
  </div>

  <!-- Invoice File List Panel -->
  <div id="invoice-list-panel" class="hidden">
    <div class="bg-gray-900 rounded-2xl overflow-hidden">

      <!-- Panel Header -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800">
        <div class="flex items-center gap-2">
          <span class="text-sm">🗂️</span>
          <p class="text-xs font-bold text-gray-300">Uploaded Invoices</p>
          <span id="invoice-list-count" class="text-xs font-semibold bg-gray-700 text-gray-400 px-2 py-0.5 rounded-full">0</span>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="deleteSelectedInvoices()"
            id="btn-delete-selected"
            class="hidden text-xs font-bold text-red-400 hover:text-white hover:bg-red-600 transition px-3 py-1 rounded-lg border border-red-700 border-opacity-50">
            🗑️ Delete Selected (<span id="selected-count">0</span>)
          </button>
          <button onclick="toggleSelectAll()"
            id="btn-select-all"
            class="text-xs font-semibold text-gray-400 hover:text-white transition px-2 py-1 rounded-lg hover:bg-gray-700">
            Select All
          </button>
        </div>
      </div>

      <!-- File Rows -->
      <div id="invoice-file-list" class="divide-y divide-gray-800 max-h-56 overflow-y-auto"></div>

      <!-- Panel Footer Status -->
      <div id="invoice-list-status" class="hidden px-4 py-2 border-t border-gray-800">
        <p class="text-xs"></p>
      </div>

    </div>
  </div>

</div>
