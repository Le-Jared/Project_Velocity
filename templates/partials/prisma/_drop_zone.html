<!-- Media Plan Upload Drop Zone -->
<div class="bg-gray-900 border border-white border-opacity-5 rounded-2xl p-6">
  <div class="flex items-center justify-between mb-4">
    <div>
      <h3 class="text-base font-bold text-white">Upload Media Plan</h3>
      <p class="text-xs text-gray-500">Drop .xlsx — auto-detects client (MCP / MI / GU / NA)</p>
    </div>
    <span id="prisma-upload-status" class="text-xs hidden"></span>
  </div>

  <div id="prisma-drop-zone"
       ondragover="onPrismaDragOver(event)"
       ondragleave="onPrismaDragLeave()"
       ondrop="onPrismaDrop(event)"
       onclick="document.getElementById('prisma-file-input').click()"
       class="border-2 border-dashed border-violet-700 border-opacity-40 rounded-xl p-10 text-center cursor-pointer hover:border-violet-500 hover:bg-violet-500 hover:bg-opacity-5 transition">
    <input type="file"
           id="prisma-file-input"
           accept=".xlsx,.xls"
           multiple
           class="hidden"
           onchange="uploadPlans(this.files)" />

    <div class="text-4xl mb-2">📐</div>
    <p class="text-sm font-semibold text-gray-200">Drop media plan files here</p>
    <p class="text-xs text-gray-500 mt-1">or click to browse · supports multiple files</p>
    <p class="text-xs text-violet-400 mt-3">
      Supports SkillIgnition · MI / Mercari · MCP 2026 templates
    </p>
  </div>
</div>
